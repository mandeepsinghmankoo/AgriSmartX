services:
  - type: web
    name: agrismartx-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd agri && gunicorn agri.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://agri-smart-x-aood.vercel.app"
      - key: PYTHON_VERSION
        value: "3.10.0"
